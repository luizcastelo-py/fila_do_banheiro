<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Banheiro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
      --border: #e2e0d8; --text: #1a1917; --text-muted: #78756e;
      --accent: #2563eb; --accent-bg: #eff6ff; --accent-border: #bfdbfe;
      --success: #16a34a; --success-bg: #f0fdf4; --success-border: #bbf7d0;
      --warning-bg: #fffbeb; --warning-border: #fde68a; --warning: #b45309;
      --danger: #dc2626; --danger-bg: #fef2f2; --danger-border: #fecaca;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOADING */
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 200; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--text-muted); }

    /* AUTH SCREEN */
    #auth-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
    #auth-screen.visible { display: flex; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; width: 100%; max-width: 400px; }
    .auth-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .auth-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 20px; overflow: hidden; }
    .auth-tab { flex: 1; height: 36px; border: none; background: transparent; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .field input { width: 100%; height: 40px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; }
    .field input:focus { border-color: var(--accent); background: var(--surface); }
    .btn { height: 40px; padding: 0 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: var(--surface2); }
    .btn:active { transform: scale(0.98); }
    .btn-full { width: 100%; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-accent:hover { background: #1d4ed8; }
    .btn-success { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
    .btn-danger-outline { background: transparent; border-color: var(--danger-border); color: var(--danger); }
    .btn-danger-outline:hover { background: var(--danger-bg); }
    .btn-sm { height: 34px; padding: 0 12px; font-size: 13px; }
    .btn-google { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn-google:hover { background: var(--surface2); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--text-muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-error { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 14px; display: none; }
    .auth-error.visible { display: block; }
    .auth-switch { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 16px; }
    .auth-switch a { color: var(--accent); cursor: pointer; text-decoration: none; }

    /* MAIN APP */
    #app { display: none; }
    #app.visible { display: block; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; flex-direction: column; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .live-dot { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .dot.on { background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .user-pill { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px 4px 6px; font-size: 12px; }
    .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--accent-border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--accent); flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .main { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }
    .my-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .my-bar-label { font-size: 11px; color: var(--text-muted); }
    .my-bar-name { font-size: 15px; font-weight: 600; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .count-badge { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px; color: var(--text-muted); }
    .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .slot { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .slot.empty { background: var(--surface2); }
    .slot.occupied { background: var(--accent-bg); border-color: var(--accent-border); }
    .slot-icon { font-size: 18px; margin-bottom: 4px; }
    .slot-name { font-size: 13px; font-weight: 600; color: var(--accent); }
    .slot-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .slot.empty .slot-hint { color: #c4c1b8; }
    .queue-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .queue-item:last-child { border-bottom: none; }
    .queue-pos { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); min-width: 20px; }
    .queue-name { font-size: 14px; font-weight: 500; flex: 1; }
    .badge-waiting { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: var(--warning-bg); border: 1px solid var(--warning-border); color: var(--warning); }
    .empty-state { text-align: center; padding: 20px 0; font-size: 13px; color: var(--text-muted); }

    /* ADMIN PANEL */
    .admin-panel { background: var(--surface); border: 1px solid var(--danger-border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
    .admin-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--danger); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* LOGOUT */
    .logout-btn { font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 4px; font-family: 'DM Sans', sans-serif; }
    .logout-btn:hover { color: var(--danger); }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Carregando...</p>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">Controle de Banheiro</div>
    <div class="auth-sub">Faça login para continuar</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Cadastrar</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <div id="form-login">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="btn btn-accent btn-full" id="btn-login">Entrar</button>
      <div class="divider">ou</div>
      <button class="btn btn-google btn-full" id="btn-google-login">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar com Google
      </button>
    </div>

    <div id="form-register" style="display:none;">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="reg-name" placeholder="Seu nome" maxlength="40" />
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
      </div>
      <button class="btn btn-accent btn-full" id="btn-register">Criar conta</button>
      <div class="divider">ou</div>
      <button class="btn btn-google btn-full" id="btn-google-reg">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Cadastrar com Google
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-title">Controle de Banheiro</div>
      <div class="header-sub">Máx. 2 vagas simultâneas</div>
    </div>
    <div class="header-right">
      <div class="live-dot">
        <div class="dot" id="conn-dot"></div>
        <span id="conn-label">conectando</span>
      </div>
      <div class="user-pill">
        <div class="avatar" id="user-avatar"></div>
        <span id="user-name-pill"></span>
      </div>
      <button class="logout-btn" id="btn-logout">Sair</button>
    </div>
  </header>

  <div class="main">
    <!-- Admin panel -->
    <div class="admin-panel" id="admin-panel" style="display:none;">
      <div class="admin-title">⚙ Painel do professor</div>
      <div class="admin-actions">
        <button class="btn btn-danger-outline btn-sm" id="btn-reset-all">Resetar tudo</button>
        <button class="btn btn-sm" id="btn-clear-queue">Limpar fila</button>
        <button class="btn btn-sm" id="btn-free-slots">Liberar vagas</button>
      </div>
    </div>

    <!-- My action bar -->
    <div class="my-bar" id="my-bar">
      <div>
        <div class="my-bar-label">Você está logado como</div>
        <div class="my-bar-name" id="my-bar-name"></div>
      </div>
      <div id="my-action"></div>
    </div>

    <!-- Slots -->
    <div class="card">
      <div class="section-title">
        No banheiro agora
        <span class="count-badge" id="slots-count">0 / 2</span>
      </div>
      <div class="slots-grid">
        <div class="slot empty" id="slot-0"><div class="slot-icon">🚪</div><div class="slot-hint">Vaga livre</div></div>
        <div class="slot empty" id="slot-1"><div class="slot-icon">🚪</div><div class="slot-hint">Vaga livre</div></div>
      </div>
    </div>

    <!-- Queue -->
    <div class="card">
      <div class="section-title">
        Fila de espera
        <span class="count-badge" id="queue-count">0 na fila</span>
      </div>
      <div id="queue-list"><div class="empty-state">Nenhum aluno na fila</div></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyB4xX1yhhO5HbJKN3A6XiZ2ncbQxXSpHOo",
    authDomain: "banheiro-sala-3f4a3.firebaseapp.com",
    databaseURL: "https://banheiro-sala-3f4a3-default-rtdb.firebaseio.com",
    projectId: "banheiro-sala-3f4a3",
    storageBucket: "banheiro-sala-3f4a3.firebasestorage.app",
    messagingSenderId: "318843831948",
    appId: "1:318843831948:web:782beabb242a563c739da9"
  });

  var auth = firebase.auth();
  var db = firebase.database();
  var stateRef = db.ref('sala/estado');

  var currentUser = null;
  var displayName = null;
  var isAdmin = false;
  var currentTab = 'login';

  // ── Helpers ──────────────────────────────────────────────────────────────
  function emailToKey(email) {
    return email.replace(/\./g, '_').replace(/@/g, '_');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function normalize(raw) {
    var slots = [null, null];
    var queue = [];
    if (raw) {
      if (raw.slots) {
        slots[0] = raw.slots[0] !== undefined ? (raw.slots[0] || null) : null;
        slots[1] = raw.slots[1] !== undefined ? (raw.slots[1] || null) : null;
      }
      if (raw.queue) {
        queue = Array.isArray(raw.queue)
          ? raw.queue.filter(function(n){ return n != null; })
          : Object.values(raw.queue).filter(function(n){ return n != null; });
      }
    }
    return { slots: slots, queue: queue };
  }

  function saveState(s) {
    stateRef.set({
      slots: { 0: s.slots[0] || null, 1: s.slots[1] || null },
      queue: s.queue.length > 0 ? s.queue : []
    });
  }

  function showError(msg) {
    var el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError() {
    var el = document.getElementById('auth-error');
    el.textContent = '';
    el.classList.remove('visible');
  }

  // ── Auth UI ───────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    clearError();
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  }

  function friendlyError(code) {
    var msgs = {
      'auth/invalid-email': 'E-mail inválido.',
      'auth/user-not-found': 'Usuário não encontrado.',
      'auth/wrong-password': 'Senha incorreta.',
      'auth/email-already-in-use': 'Este e-mail já está cadastrado.',
      'auth/weak-password': 'Senha muito fraca. Use pelo menos 6 caracteres.',
      'auth/popup-closed-by-user': 'Login cancelado.',
      'auth/invalid-credential': 'E-mail ou senha incorretos.'
    };
    return msgs[code] || 'Erro: ' + code;
  }

  function doLogin() {
    clearError();
    var email = document.getElementById('login-email').value.trim();
    var pass = document.getElementById('login-pass').value;
    if (!email || !pass) { showError('Preencha e-mail e senha.'); return; }
    auth.signInWithEmailAndPassword(email, pass)
      .catch(function(e) { showError(friendlyError(e.code)); });
  }

  function doRegister() {
    clearError();
    var name = document.getElementById('reg-name').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var pass = document.getElementById('reg-pass').value;
    if (!name || !email || !pass) { showError('Preencha todos os campos.'); return; }
    auth.createUserWithEmailAndPassword(email, pass)
      .then(function(cred) {
        return cred.user.updateProfile({ displayName: name });
      })
      .catch(function(e) { showError(friendlyError(e.code)); });
  }

  function doGoogle() {
    clearError();
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .catch(function(e) { showError(friendlyError(e.code)); });
  }

  function doLogout() {
    // Remove da fila/slot antes de sair
    if (displayName) {
      stateRef.once('value', function(snap) {
        var s = normalize(snap.val());
        var changed = false;
        if (s.slots[0] === displayName) { s.slots[0] = s.queue.length > 0 ? s.queue.shift() : null; changed = true; }
        else if (s.slots[1] === displayName) { s.slots[1] = s.queue.length > 0 ? s.queue.shift() : null; changed = true; }
        var qi = s.queue.indexOf(displayName);
        if (qi !== -1) { s.queue.splice(qi, 1); changed = true; }
        if (changed) saveState(s);
        auth.signOut();
      });
    } else {
      auth.signOut();
    }
  }

  // ── App render ────────────────────────────────────────────────────────────
  function render(state) {
    var slots = state.slots;
    var queue = state.queue;

    var occ = (slots[0] ? 1 : 0) + (slots[1] ? 1 : 0);
    document.getElementById('slots-count').textContent = occ + ' / 2';

    for (var i = 0; i < 2; i++) {
      var el = document.getElementById('slot-' + i);
      if (slots[i]) {
        el.className = 'slot occupied';
        el.innerHTML = '<div class="slot-icon">🚶</div><div class="slot-name">' + esc(slots[i]) + '</div><div class="slot-hint">no banheiro</div>';
      } else {
        el.className = 'slot empty';
        el.innerHTML = '<div class="slot-icon">🚪</div><div class="slot-hint">Vaga livre</div>';
      }
    }

    document.getElementById('queue-count').textContent = queue.length + ' na fila';
    var qEl = document.getElementById('queue-list');
    if (queue.length === 0) {
      qEl.innerHTML = '<div class="empty-state">Nenhum aluno na fila</div>';
    } else {
      var html = '';
      for (var j = 0; j < queue.length; j++) {
        html += '<div class="queue-item"><span class="queue-pos">' + (j+1) + 'º</span><span class="queue-name">' + esc(queue[j]) + '</span><span class="badge-waiting">aguardando</span></div>';
      }
      qEl.innerHTML = html;
    }

    if (!displayName) return;
    var inSlot = (slots[0] === displayName || slots[1] === displayName);
    var inQueue = queue.indexOf(displayName) !== -1;
    var div = document.getElementById('my-action');

    if (inSlot) {
      div.innerHTML = '<button class="btn btn-success btn-sm" id="btn-voltei">✓ Voltei!</button>';
      document.getElementById('btn-voltei').onclick = voltei;
    } else if (inQueue) {
      div.innerHTML = '<button class="btn btn-sm" id="btn-sair">Sair da fila</button>';
      document.getElementById('btn-sair').onclick = sairFila;
    } else {
      div.innerHTML = '<button class="btn btn-accent btn-sm" id="btn-ir">Ir ao banheiro</button>';
      document.getElementById('btn-ir').onclick = irBanheiro;
    }
  }

  // ── Banheiro actions ──────────────────────────────────────────────────────
  function irBanheiro() {
    stateRef.once('value', function(snap) {
      var s = normalize(snap.val());
      if (s.slots[0] === displayName || s.slots[1] === displayName) return;
      if (s.queue.indexOf(displayName) !== -1) return;
      if (!s.slots[0]) s.slots[0] = displayName;
      else if (!s.slots[1]) s.slots[1] = displayName;
      else s.queue.push(displayName);
      saveState(s);
    });
  }

  function voltei() {
    stateRef.once('value', function(snap) {
      var s = normalize(snap.val());
      var idx = -1;
      if (s.slots[0] === displayName) idx = 0;
      else if (s.slots[1] === displayName) idx = 1;
      if (idx !== -1) {
        s.slots[idx] = s.queue.length > 0 ? s.queue.shift() : null;
        saveState(s);
      }
    });
  }

  function sairFila() {
    stateRef.once('value', function(snap) {
      var s = normalize(snap.val());
      s.queue = s.queue.filter(function(n){ return n !== displayName; });
      saveState(s);
    });
  }

  // ── Admin actions ─────────────────────────────────────────────────────────
  function resetAll() {
    if (confirm('Resetar tudo? Isso vai limpar vagas e fila.')) {
      saveState({ slots: [null, null], queue: [] });
    }
  }

  function clearQueue() {
    stateRef.once('value', function(snap) {
      var s = normalize(snap.val());
      s.queue = [];
      saveState(s);
    });
  }

  function freeSlots() {
    stateRef.once('value', function(snap) {
      var s = normalize(snap.val());
      s.slots = [null, null];
      saveState(s);
    });
  }

  // ── Auth state listener ───────────────────────────────────────────────────
  auth.onAuthStateChanged(function(user) {
    document.getElementById('loading').style.display = 'none';

    if (!user) {
      currentUser = null;
      displayName = null;
      isAdmin = false;
      document.getElementById('app').classList.remove('visible');
      document.getElementById('auth-screen').classList.add('visible');
      return;
    }

    currentUser = user;
    displayName = user.displayName || user.email.split('@')[0];

    document.getElementById('auth-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');

    // Avatar
    var avatarEl = document.getElementById('user-avatar');
    if (user.photoURL) {
      avatarEl.innerHTML = '<img src="' + user.photoURL + '" />';
    } else {
      avatarEl.textContent = displayName.charAt(0).toUpperCase();
    }
    document.getElementById('user-name-pill').textContent = displayName;
    document.getElementById('my-bar-name').textContent = displayName;

    // Check admin
    var key = emailToKey(user.email);
    db.ref('admins/' + key).once('value', function(snap) {
      isAdmin = snap.val() === true;
      document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
    });

    // Init DB if empty
    stateRef.once('value', function(snap) {
      if (!snap.exists()) saveState({ slots: [null, null], queue: [] });
      document.getElementById('conn-dot').className = 'dot on';
      document.getElementById('conn-label').textContent = 'ao vivo';
    });

    // Realtime listener
    stateRef.on('value', function(snap) {
      render(normalize(snap.val()));
    });
  });

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('btn-login').onclick = doLogin;
  document.getElementById('btn-register').onclick = doRegister;
  document.getElementById('btn-google-login').onclick = doGoogle;
  document.getElementById('btn-google-reg').onclick = doGoogle;
  document.getElementById('btn-logout').onclick = doLogout;
  document.getElementById('btn-reset-all').onclick = resetAll;
  document.getElementById('btn-clear-queue').onclick = clearQueue;
  document.getElementById('btn-free-slots').onclick = freeSlots;

  document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('reg-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doRegister();
  });
</script>
</body>
</html>
